<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#fff" stroke="#4f46e5" stroke-width="2"/>
  
  <!-- Outer compass ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Cardinal direction markers (N, S, E, W) -->
  <line x1="100" y1="20" x2="100" y2="35" stroke="#4f46e5" stroke-width="2"/>
  <line x1="100" y1="165" x2="100" y2="180" stroke="#4f46e5" stroke-width="1"/>
  <line x1="20" y1="100" x2="35" y2="100" stroke="#4f46e5" stroke-width="1"/>
  <line x1="165" y1="100" x2="180" y2="100" stroke="#4f46e5" stroke-width="2"/>
  
  <!-- Intermediate direction markers -->
  <line x1="129" y1="29" x2="138" y2="38" stroke="#4f46e5" stroke-width="1" opacity="0.5"/>
  <line x1="71" y1="29" x2="62" y2="38" stroke="#4f46e5" stroke-width="1" opacity="0.5"/>
  
  <!-- Inner circle with heart/person icon -->
  <circle cx="100" cy="100" r="50" fill="#4f46e5" opacity="0.1"/>
  
  <!-- Stylized beacon/heart shape - represents connection and finding -->
  <!-- Top curve (heart top) -->
  <path d="M 85 85 Q 75 75 75 65 Q 75 55 85 55 Q 95 55 100 65 Q 105 55 115 55 Q 125 55 125 65 Q 125 75 115 85" 
        fill="#4f46e5"/>
  <!-- Bottom point -->
  <path d="M 85 85 L 100 110 L 115 85 Q 100 95 85 85" fill="#ec4899"/>
  
  <!-- Radiating lines (beacon effect) -->
  <line x1="100" y1="100" x2="100" y2="40" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="100" x2="135" y2="65" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="100" x2="160" y2="100" stroke="#ec4899" stroke-width="1.5" opacity="0.4"/>
</svg>